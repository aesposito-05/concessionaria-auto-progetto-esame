<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="1200" height="780" fill="white"/>
  <text x="600" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Diagramma E-R completo — Soluzione adottata (tre tabelle: Cliente + Privato + Azienda)</text>

  <!-- ===== MARCA ===== -->
  <rect x="20" y="50" width="150" height="115" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="20" y="50" width="150" height="24" rx="6" fill="#343a40"/>
  <rect x="20" y="68" width="150" height="6" fill="#343a40"/>
  <text x="95" y="67" text-anchor="middle" fill="white" font-weight="bold">MARCA</text>
  <text x="95" y="44" text-anchor="middle" fill="#555" font-size="10">(1,N) produce AUTO</text>
  <text x="36" y="90" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="56" y="90" fill="#1a1a1a" font-size="11">id_marca</text>
  <text x="36" y="106" fill="#555" font-size="11">   nome</text>
  <text x="36" y="122" fill="#555" font-size="11">   paese</text>

  <!-- ===== FORNITORE ===== -->
  <rect x="20" y="225" width="150" height="115" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="20" y="225" width="150" height="24" rx="6" fill="#343a40"/>
  <rect x="20" y="243" width="150" height="6" fill="#343a40"/>
  <text x="95" y="242" text-anchor="middle" fill="white" font-weight="bold">FORNITORE</text>
  <text x="95" y="219" text-anchor="middle" fill="#555" font-size="10">(1,N) fornisce AUTO</text>
  <text x="36" y="265" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="56" y="265" fill="#1a1a1a" font-size="11">id_fornitore</text>
  <text x="36" y="281" fill="#555" font-size="11">   nome</text>
  <text x="36" y="297" fill="#555" font-size="11">   paese</text>

  <!-- ===== AUTO ===== -->
  <rect x="230" y="120" width="165" height="195" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="230" y="120" width="165" height="24" rx="6" fill="#343a40"/>
  <rect x="230" y="138" width="165" height="6" fill="#343a40"/>
  <text x="312" y="137" text-anchor="middle" fill="white" font-weight="bold">AUTO</text>
  <text x="312" y="114" text-anchor="middle" fill="#555" font-size="10">(0,N) Manutenzione  (0,N) DetVendita</text>
  <text x="246" y="160" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="266" y="160" fill="#1a1a1a" font-size="11">id_auto</text>
  <text x="246" y="176" fill="#555" font-size="11">   modello</text>
  <text x="246" y="192" fill="#555" font-size="11">   prezzo</text>
  <text x="246" y="208" fill="#555" font-size="11">   anno</text>
  <text x="246" y="224" fill="#555" font-size="11">   stato</text>
  <text x="246" y="244" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="266" y="244" fill="#c0392b" font-size="11">id_marca → MARCA</text>
  <text x="246" y="260" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="266" y="260" fill="#c0392b" font-size="11">id_fornitore → FORNITORE</text>
  <text x="246" y="278" fill="#555" font-size="10" font-style="italic">(N,1) per Marca e Fornitore</text>

  <!-- linee MARCA/FORNITORE→AUTO -->
  <line x1="170" y1="100" x2="230" y2="170" stroke="#6c757d" stroke-width="1.5"/>
  <line x1="170" y1="273" x2="230" y2="235" stroke="#6c757d" stroke-width="1.5"/>

  <!-- ===== CLIENTE ===== -->
  <rect x="460" y="120" width="185" height="160" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <rect x="460" y="120" width="185" height="24" rx="6" fill="#27ae60"/>
  <rect x="460" y="138" width="185" height="6" fill="#27ae60"/>
  <text x="552" y="137" text-anchor="middle" fill="white" font-weight="bold">CLIENTE</text>
  <text x="552" y="114" text-anchor="middle" fill="#555" font-size="10">(0,N) Vendita  specializza→ Privato/Azienda</text>
  <text x="476" y="160" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="496" y="160" fill="#1a1a1a" font-size="11">id_cliente</text>
  <text x="476" y="176" fill="#555" font-size="11">   email</text>
  <text x="476" y="192" fill="#555" font-size="11">   telefono</text>
  <text x="476" y="208" fill="#555" font-size="11">   citta</text>
  <text x="476" y="224" fill="#555" font-size="11">   tipo_cliente</text>
  <text x="476" y="244" fill="#27ae60" font-size="10" font-style="italic">generalizzazione totale ed esclusiva</text>
  <text x="476" y="258" fill="#27ae60" font-size="10" font-style="italic">→ Privato OPPURE Azienda</text>

  <!-- ===== PRIVATO ===== -->
  <rect x="360" y="360" width="180" height="180" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="360" y="360" width="180" height="24" rx="6" fill="#2196f3"/>
  <rect x="360" y="378" width="180" height="6" fill="#2196f3"/>
  <text x="450" y="377" text-anchor="middle" fill="white" font-weight="bold">PRIVATO</text>
  <text x="450" y="354" text-anchor="middle" fill="#555" font-size="10">specializzazione di CLIENTE (1,1)</text>
  <text x="376" y="400" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="396" y="400" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="420" y="400" fill="#c0392b" font-size="11">id_cliente → CLIENTE</text>
  <text x="376" y="416" fill="#555" font-size="11">   codice_fiscale</text>
  <text x="376" y="432" fill="#555" font-size="11">   nome</text>
  <text x="376" y="448" fill="#555" font-size="11">   cognome</text>
  <text x="376" y="464" fill="#555" font-size="11">   data_nascita</text>
  <text x="376" y="484" fill="#2196f3" font-size="10" font-style="italic">PK = FK (OneToOne)</text>
  <text x="376" y="498" fill="#555" font-size="10" font-style="italic">(1,1) → (1,1) con CLIENTE</text>
  <!-- freccia specializzazione CLIENTE→PRIVATO -->
  <line x1="500" y1="280" x2="450" y2="360" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="458" y="330" fill="#27ae60" font-size="10">specializza</text>

  <!-- ===== AZIENDA ===== -->
  <rect x="610" y="360" width="180" height="165" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <rect x="610" y="360" width="180" height="24" rx="6" fill="#ff9800"/>
  <rect x="610" y="378" width="180" height="6" fill="#ff9800"/>
  <text x="700" y="377" text-anchor="middle" fill="white" font-weight="bold">AZIENDA</text>
  <text x="700" y="354" text-anchor="middle" fill="#555" font-size="10">specializzazione di CLIENTE (1,1)</text>
  <text x="626" y="400" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="646" y="400" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="670" y="400" fill="#c0392b" font-size="11">id_cliente → CLIENTE</text>
  <text x="626" y="416" fill="#555" font-size="11">   partita_iva</text>
  <text x="626" y="432" fill="#555" font-size="11">   ragione_sociale</text>
  <text x="626" y="448" fill="#555" font-size="11">   settore</text>
  <text x="626" y="468" fill="#ff9800" font-size="10" font-style="italic">PK = FK (OneToOne)</text>
  <text x="626" y="482" fill="#555" font-size="10" font-style="italic">(1,1) → (1,1) con CLIENTE</text>
  <!-- freccia specializzazione CLIENTE→AZIENDA -->
  <line x1="600" y1="280" x2="660" y2="360" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="330" fill="#27ae60" font-size="10">specializza</text>

  <!-- ===== DIPENDENTE ===== -->
  <rect x="920" y="50" width="165" height="145" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="920" y="50" width="165" height="24" rx="6" fill="#343a40"/>
  <rect x="920" y="68" width="165" height="6" fill="#343a40"/>
  <text x="1002" y="67" text-anchor="middle" fill="white" font-weight="bold">DIPENDENTE</text>
  <text x="1002" y="44" text-anchor="middle" fill="#555" font-size="10">(1,N) Vendita gestisce</text>
  <text x="936" y="90" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="956" y="90" fill="#1a1a1a" font-size="11">id_dipendente</text>
  <text x="936" y="106" fill="#555" font-size="11">   nome</text>
  <text x="936" y="122" fill="#555" font-size="11">   cognome</text>
  <text x="936" y="138" fill="#555" font-size="11">   ruolo</text>
  <text x="936" y="154" fill="#555" font-size="11">   stipendio</text>

  <!-- ===== VENDITA ===== -->
  <rect x="840" y="250" width="185" height="195" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="840" y="250" width="185" height="24" rx="6" fill="#343a40"/>
  <rect x="840" y="268" width="185" height="6" fill="#343a40"/>
  <text x="932" y="267" text-anchor="middle" fill="white" font-weight="bold">VENDITA</text>
  <text x="932" y="244" text-anchor="middle" fill="#555" font-size="10">(0,N) per Cliente  (1,N) DetVendita</text>
  <text x="856" y="290" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="876" y="290" fill="#1a1a1a" font-size="11">id_vendita</text>
  <text x="856" y="306" fill="#555" font-size="11">   data_vendita</text>
  <text x="856" y="322" fill="#555" font-size="11">   importo_totale</text>
  <text x="856" y="342" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="876" y="342" fill="#c0392b" font-size="11">id_cliente → CLIENTE</text>
  <text x="856" y="358" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="876" y="358" fill="#c0392b" font-size="11">id_dipendente → DIP.</text>
  <text x="856" y="378" fill="#555" font-size="10" font-style="italic">(N,1) per Cliente e Dipendente</text>
  <text x="856" y="392" fill="#27ae60" font-size="10" font-style="italic">un'unica FK per tutti i clienti ✓</text>
  <text x="856" y="406" fill="#555" font-size="10" font-style="italic">(0,N) in Dettaglio_Vendita</text>

  <!-- linea DIPENDENTE→VENDITA -->
  <line x1="1002" y1="195" x2="1002" y2="250" stroke="#6c757d" stroke-width="1.5"/>
  <!-- linea CLIENTE→VENDITA -->
  <line x1="645" y1="200" x2="840" y2="310" stroke="#6c757d" stroke-width="1.5"/>

  <!-- ===== MANUTENZIONE ===== -->
  <rect x="230" y="400" width="165" height="145" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="230" y="400" width="165" height="24" rx="6" fill="#343a40"/>
  <rect x="230" y="418" width="165" height="6" fill="#343a40"/>
  <text x="312" y="417" text-anchor="middle" fill="white" font-weight="bold">MANUTENZIONE</text>
  <text x="312" y="394" text-anchor="middle" fill="#555" font-size="10">(N,1) richiede AUTO</text>
  <text x="246" y="440" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="266" y="440" fill="#1a1a1a" font-size="11">id_manutenzione</text>
  <text x="246" y="456" fill="#555" font-size="11">   data_intervento</text>
  <text x="246" y="472" fill="#555" font-size="11">   descrizione</text>
  <text x="246" y="488" fill="#555" font-size="11">   costo</text>
  <text x="246" y="508" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="266" y="508" fill="#c0392b" font-size="11">id_auto → AUTO</text>
  <text x="246" y="524" fill="#555" font-size="10" font-style="italic">(0,N) per AUTO</text>

  <!-- linea AUTO→MANUTENZIONE -->
  <line x1="312" y1="315" x2="312" y2="400" stroke="#6c757d" stroke-width="1.5"/>

  <!-- ===== DETTAGLIO_VENDITA ===== -->
  <rect x="560" y="580" width="215" height="130" rx="6" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="560" y="580" width="215" height="24" rx="6" fill="#343a40"/>
  <rect x="560" y="598" width="215" height="6" fill="#343a40"/>
  <text x="667" y="597" text-anchor="middle" fill="white" font-weight="bold">DETTAGLIO_VENDITA</text>
  <text x="667" y="574" text-anchor="middle" fill="#555" font-size="10">(N,M) risolve Vendita↔Auto</text>
  <text x="576" y="620" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="596" y="620" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="620" y="620" fill="#c0392b" font-size="11">id_vendita → VENDITA</text>
  <text x="576" y="636" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="596" y="636" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="620" y="636" fill="#c0392b" font-size="11">id_auto → AUTO</text>
  <text x="576" y="652" fill="#555" font-size="11">   quantita</text>
  <text x="576" y="668" fill="#555" font-size="11">   prezzo_unitario</text>
  <text x="576" y="684" fill="#555" font-size="10" font-style="italic">PK composta: (id_vendita, id_auto)</text>

  <!-- linea VENDITA→DETTAGLIO -->
  <line x1="932" y1="445" x2="775" y2="595" stroke="#6c757d" stroke-width="1.5"/>
  <!-- linea AUTO→DETTAGLIO -->
  <line x1="395" y1="295" x2="560" y2="625" stroke="#6c757d" stroke-width="1.5"/>

  <!-- Legenda -->
  <rect x="20" y="640" width="200" height="75" rx="4" fill="#f8f9fa" stroke="#aaa" stroke-width="1"/>
  <text x="120" y="660" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Legenda</text>
  <text x="36" y="676" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="56" y="676" fill="#555" font-size="11">= Chiave Primaria</text>
  <text x="36" y="692" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="56" y="692" fill="#555" font-size="11">= Chiave Esterna</text>
  <line x1="36" y1="704" x2="56" y2="704" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="62" y="708" fill="#27ae60" font-size="11">= Specializzazione</text>

  <!-- Box motivazione scelta -->
  <rect x="240" y="640" width="940" height="75" rx="5" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="710" y="660" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">Soluzione adottata: "table per subclass" — tre tabelle distinte</text>
  <text x="710" y="678" text-anchor="middle" fill="#2e7d32" font-size="11">CLIENTE contiene gli attributi comuni (email, telefono, citta). PRIVATO e AZIENDA estendono CLIENTE con PK=FK (OneToOne).</text>
  <text x="710" y="696" text-anchor="middle" fill="#2e7d32" font-size="11">Nessun valore NULL strutturale. Un'unica FK in VENDITA (id_cliente) copre sia privati che aziende. Totalità ed esclusività garantite.</text>
  <text x="710" y="714" text-anchor="middle" fill="#2e7d32" font-size="11">Cardinalità specializzazione: ogni CLIENTE (1,1) corrisponde a un PRIVATO o AZIENDA (1,1). Nessun cliente "generico" senza sottotipo.</text>
</svg>
