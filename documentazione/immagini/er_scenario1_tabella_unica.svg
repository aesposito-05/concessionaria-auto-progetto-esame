<svg viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="1100" height="680" fill="white"/>
  <text x="550" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Scenario 1 — Tabella unica CLIENTE (problema: valori NULL)</text>

  <!-- ===== MARCA ===== -->
  <rect x="20" y="50" width="145" height="130" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="20" y="50" width="145" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="20" y="68" width="145" height="6" fill="#1a1a1a"/>
  <text x="92" y="67" text-anchor="middle" fill="white" font-weight="bold">MARCA</text>
  <!-- cardinalità -->
  <text x="92" y="44" text-anchor="middle" fill="#555" font-size="11">(1,1) ← AUTO (N,1)</text>
  <text x="36" y="90" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="56" y="90" fill="#1a1a1a" font-size="11">id_marca</text>
  <text x="36" y="106" fill="#555" font-size="11">   nome</text>
  <text x="36" y="122" fill="#555" font-size="11">   paese</text>

  <!-- ===== FORNITORE ===== -->
  <rect x="20" y="230" width="145" height="115" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="20" y="230" width="145" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="20" y="248" width="145" height="6" fill="#1a1a1a"/>
  <text x="92" y="247" text-anchor="middle" fill="white" font-weight="bold">FORNITORE</text>
  <text x="92" y="224" text-anchor="middle" fill="#555" font-size="11">(1,1) ← AUTO (N,1)</text>
  <text x="36" y="270" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="56" y="270" fill="#1a1a1a" font-size="11">id_fornitore</text>
  <text x="36" y="286" fill="#555" font-size="11">   nome</text>
  <text x="36" y="302" fill="#555" font-size="11">   paese</text>

  <!-- ===== AUTO ===== -->
  <rect x="220" y="130" width="155" height="160" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="220" y="130" width="155" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="220" y="148" width="155" height="6" fill="#1a1a1a"/>
  <text x="297" y="147" text-anchor="middle" fill="white" font-weight="bold">AUTO</text>
  <text x="297" y="124" text-anchor="middle" fill="#555" font-size="11">(0,N) Manutenzione</text>
  <text x="236" y="171" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="256" y="171" fill="#1a1a1a" font-size="11">id_auto</text>
  <text x="236" y="187" fill="#555" font-size="11">   modello</text>
  <text x="236" y="203" fill="#555" font-size="11">   prezzo</text>
  <text x="236" y="219" fill="#555" font-size="11">   anno</text>
  <text x="236" y="235" fill="#555" font-size="11">   stato</text>
  <text x="236" y="251" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="256" y="251" fill="#c0392b" font-size="11">id_marca</text>
  <text x="236" y="267" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="256" y="267" fill="#c0392b" font-size="11">id_fornitore</text>

  <!-- linea MARCA→AUTO -->
  <line x1="165" y1="108" x2="220" y2="175" stroke="#aaa" stroke-width="1.5"/>
  <!-- linea FORNITORE→AUTO -->
  <line x1="165" y1="278" x2="220" y2="240" stroke="#aaa" stroke-width="1.5"/>

  <!-- ===== CLIENTE unica (grande, con null) ===== -->
  <rect x="430" y="40" width="200" height="370" rx="6" fill="#fff5f5" stroke="#e74c3c" stroke-width="2"/>
  <rect x="430" y="40" width="200" height="24" rx="6" fill="#e74c3c"/>
  <rect x="430" y="58" width="200" height="6" fill="#e74c3c"/>
  <text x="530" y="57" text-anchor="middle" fill="white" font-weight="bold">CLIENTE</text>
  <text x="530" y="34" text-anchor="middle" fill="#555" font-size="11">(0,N) Vendita   (1,1) Vendita→</text>
  <text x="446" y="82" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="466" y="82" fill="#1a1a1a" font-size="11">id_cliente</text>
  <text x="446" y="98" fill="#555" font-size="11">   email</text>
  <text x="446" y="114" fill="#555" font-size="11">   telefono</text>
  <text x="446" y="130" fill="#555" font-size="11">   citta</text>
  <text x="446" y="146" fill="#555" font-size="11">   tipo_cliente</text>
  <line x1="436" y1="154" x2="622" y2="154" stroke="#aaa" stroke-dasharray="4,3"/>
  <text x="446" y="168" fill="#e67e22" font-size="10" font-style="italic">— solo Privato (NULL se azienda) —</text>
  <text x="446" y="184" fill="#555" font-size="11">   codice_fiscale</text>
  <text x="446" y="200" fill="#555" font-size="11">   nome</text>
  <text x="446" y="216" fill="#555" font-size="11">   cognome</text>
  <text x="446" y="232" fill="#555" font-size="11">   data_nascita</text>
  <line x1="436" y1="240" x2="622" y2="240" stroke="#aaa" stroke-dasharray="4,3"/>
  <text x="446" y="254" fill="#e67e22" font-size="10" font-style="italic">— solo Azienda (NULL se privato) —</text>
  <text x="446" y="270" fill="#555" font-size="11">   partita_iva</text>
  <text x="446" y="286" fill="#555" font-size="11">   ragione_sociale</text>
  <text x="446" y="302" fill="#555" font-size="11">   settore</text>

  <!-- ===== DIPENDENTE ===== -->
  <rect x="700" y="50" width="155" height="130" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="700" y="50" width="155" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="700" y="68" width="155" height="6" fill="#1a1a1a"/>
  <text x="777" y="67" text-anchor="middle" fill="white" font-weight="bold">DIPENDENTE</text>
  <text x="777" y="44" text-anchor="middle" fill="#555" font-size="11">(1,N) Vendita</text>
  <text x="716" y="90" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="736" y="90" fill="#1a1a1a" font-size="11">id_dipendente</text>
  <text x="716" y="106" fill="#555" font-size="11">   nome</text>
  <text x="716" y="122" fill="#555" font-size="11">   cognome</text>
  <text x="716" y="138" fill="#555" font-size="11">   ruolo</text>
  <text x="716" y="154" fill="#555" font-size="11">   stipendio</text>

  <!-- ===== VENDITA ===== -->
  <rect x="700" y="240" width="155" height="145" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="700" y="240" width="155" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="700" y="258" width="155" height="6" fill="#1a1a1a"/>
  <text x="777" y="257" text-anchor="middle" fill="white" font-weight="bold">VENDITA</text>
  <text x="777" y="234" text-anchor="middle" fill="#555" font-size="11">(1,N) DettaglioVendita</text>
  <text x="716" y="280" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="736" y="280" fill="#1a1a1a" font-size="11">id_vendita</text>
  <text x="716" y="296" fill="#555" font-size="11">   data_vendita</text>
  <text x="716" y="312" fill="#555" font-size="11">   importo_totale</text>
  <text x="716" y="328" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="736" y="328" fill="#c0392b" font-size="11">id_cliente</text>
  <text x="716" y="344" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="736" y="344" fill="#c0392b" font-size="11">id_dipendente</text>
  <text x="716" y="365" fill="#555" font-size="10" font-style="italic">(0,N) per Cliente</text>

  <!-- linea DIPENDENTE→VENDITA -->
  <line x1="777" y1="180" x2="777" y2="240" stroke="#aaa" stroke-width="1.5"/>
  <!-- linea CLIENTE→VENDITA -->
  <line x1="630" y1="200" x2="700" y2="300" stroke="#aaa" stroke-width="1.5"/>

  <!-- ===== MANUTENZIONE ===== -->
  <rect x="220" y="360" width="155" height="115" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="220" y="360" width="155" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="220" y="378" width="155" height="6" fill="#1a1a1a"/>
  <text x="297" y="377" text-anchor="middle" fill="white" font-weight="bold">MANUTENZIONE</text>
  <text x="297" y="354" text-anchor="middle" fill="#555" font-size="11">(N,1) AUTO</text>
  <text x="236" y="400" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="256" y="400" fill="#1a1a1a" font-size="11">id_manutenzione</text>
  <text x="236" y="416" fill="#555" font-size="11">   data_intervento</text>
  <text x="236" y="432" fill="#555" font-size="11">   descrizione</text>
  <text x="236" y="448" fill="#555" font-size="11">   costo</text>
  <text x="236" y="464" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="256" y="464" fill="#c0392b" font-size="11">id_auto</text>

  <!-- linea AUTO→MANUTENZIONE -->
  <line x1="297" y1="290" x2="297" y2="360" stroke="#aaa" stroke-width="1.5"/>

  <!-- ===== DETTAGLIO VENDITA ===== -->
  <rect x="480" y="490" width="185" height="115" rx="6" fill="#f8f9fa" stroke="#aaa" stroke-width="1.5"/>
  <rect x="480" y="490" width="185" height="24" rx="6" fill="#1a1a1a"/>
  <rect x="480" y="508" width="185" height="6" fill="#1a1a1a"/>
  <text x="572" y="507" text-anchor="middle" fill="white" font-weight="bold">DETTAGLIO_VENDITA</text>
  <text x="572" y="484" text-anchor="middle" fill="#555" font-size="11">(N,M) Vendita↔Auto</text>
  <text x="496" y="530" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="516" y="530" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="536" y="530" fill="#c0392b" font-size="11">id_vendita</text>
  <text x="496" y="546" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="516" y="546" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="536" y="546" fill="#c0392b" font-size="11">id_auto</text>
  <text x="496" y="562" fill="#555" font-size="11">   quantita</text>
  <text x="496" y="578" fill="#555" font-size="11">   prezzo_unitario</text>

  <!-- linea VENDITA→DETTAGLIO -->
  <line x1="755" y1="385" x2="665" y2="530" stroke="#aaa" stroke-width="1.5"/>
  <!-- linea AUTO→DETTAGLIO -->
  <line x1="375" y1="250" x2="480" y2="540" stroke="#aaa" stroke-width="1.5"/>

  <!-- PROBLEMA box -->
  <rect x="20" y="590" width="1060" height="68" rx="5" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="550" y="613" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold">Problema: ogni riga ha metà campi sempre NULL.</text>
  <text x="550" y="633" text-anchor="middle" fill="#c0392b" font-size="12">Un privato ha partita_iva / ragione_sociale / settore = NULL; un'azienda ha codice_fiscale / nome / cognome / data_nascita = NULL.</text>
  <text x="550" y="651" text-anchor="middle" fill="#c0392b" font-size="12">Impossibile imporre NOT NULL sui campi specifici di ogni sottotipo.</text>

  <!-- Legenda -->
  <rect x="870" y="430" width="210" height="55" rx="4" fill="#f8f9fa" stroke="#aaa" stroke-width="1"/>
  <text x="975" y="449" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Legenda</text>
  <text x="886" y="465" fill="#1a1a1a" font-size="11" font-weight="bold">PK</text>
  <text x="906" y="465" fill="#555" font-size="11">= Chiave Primaria</text>
  <text x="886" y="479" fill="#c0392b" font-size="11" font-weight="bold">FK</text>
  <text x="906" y="479" fill="#555" font-size="11">= Chiave Esterna</text>
</svg>
