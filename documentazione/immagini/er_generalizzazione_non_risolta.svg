<svg viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <rect width="1100" height="700" fill="white"/>
  <text x="550" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Modello E-R concettuale — Generalizzazione non risolta</text>

  <!-- ══════════════════════════════════════════
       LINEE (disegnate prima dei box)
       ══════════════════════════════════════════ -->

  <!-- produce: MARCA → rombo → AUTO -->
  <line x1="130" y1="130" x2="168" y2="188" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="126" fill="#555" font-size="10">(0,N)</text>
  <line x1="232" y1="188" x2="240" y2="220" stroke="#555" stroke-width="1.5"/>
  <text x="242" y="218" fill="#555" font-size="10">(1,1)</text>

  <!-- fornisce: FORNITORE → rombo → AUTO -->
  <line x1="130" y1="330" x2="168" y2="295" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="338" fill="#555" font-size="10">(0,N)</text>
  <line x1="232" y1="295" x2="240" y2="268" stroke="#555" stroke-width="1.5"/>
  <text x="242" y="265" fill="#555" font-size="10">(1,1)</text>

  <!-- richiede: AUTO → rombo → MANUTENZIONE -->
  <line x1="315" y1="335" x2="313" y2="392" stroke="#555" stroke-width="1.5"/>
  <text x="320" y="348" fill="#555" font-size="10">(0,N)</text>
  <line x1="313" y1="420" x2="310" y2="475" stroke="#555" stroke-width="1.5"/>
  <text x="316" y="471" fill="#555" font-size="10">(1,1)</text>

  <!-- effettua: CLIENTE → rombo → VENDITA -->
  <line x1="620" y1="155" x2="720" y2="235" stroke="#555" stroke-width="1.5"/>
  <text x="624" y="148" fill="#555" font-size="10">(0,N)</text>
  <line x1="784" y1="235" x2="860" y2="295" stroke="#555" stroke-width="1.5"/>
  <text x="838" y="290" fill="#555" font-size="10">(1,1)</text>

  <!-- gestisce: DIPENDENTE → rombo → VENDITA -->
  <line x1="960" y1="185" x2="958" y2="218" stroke="#555" stroke-width="1.5"/>
  <text x="965" y="198" fill="#555" font-size="10">(0,N)</text>
  <line x1="958" y1="246" x2="956" y2="278" stroke="#555" stroke-width="1.5"/>
  <text x="962" y="273" fill="#555" font-size="10">(1,1)</text>

  <!-- VENDITA → DETTAGLIO_VENDITA -->
  <line x1="860" y1="390" x2="730" y2="560" stroke="#555" stroke-width="1.5"/>
  <text x="855" y="405" fill="#555" font-size="10">(1,N)</text>

  <!-- AUTO → DETTAGLIO_VENDITA -->
  <line x1="360" y1="335" x2="594" y2="560" stroke="#555" stroke-width="1.5"/>
  <text x="382" y="358" fill="#555" font-size="10">(0,N)</text>

  <!-- CLIENTE → cerchio generalizzazione -->
  <line x1="545" y1="210" x2="510" y2="340" stroke="#c0392b" stroke-width="2"/>
  <line x1="565" y1="210" x2="580" y2="340" stroke="#c0392b" stroke-width="2"/>

  <!-- cerchio generalizzazione → PRIVATO -->
  <line x1="488" y1="368" x2="435" y2="430" stroke="#c0392b" stroke-width="2"/>
  <text x="440" y="420" fill="#c0392b" font-size="10">(1,1)</text>

  <!-- cerchio generalizzazione → AZIENDA -->
  <line x1="602" y1="368" x2="660" y2="430" stroke="#c0392b" stroke-width="2"/>
  <text x="618" y="420" fill="#c0392b" font-size="10">(1,1)</text>

  <!-- cardinalità lato CLIENTE -->
  <text x="516" y="270" fill="#c0392b" font-size="10">(0,1)</text>
  <text x="572" y="270" fill="#c0392b" font-size="10">(0,1)</text>

  <!-- ══════════════════════════════════════════
       ENTITÀ PRINCIPALI
       ══════════════════════════════════════════ -->

  <!-- MARCA -->
  <rect x="30" y="88" width="100" height="75" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="30" y="88" width="100" height="20" rx="5" fill="#343a40"/>
  <rect x="30" y="102" width="100" height="6" fill="#343a40"/>
  <text x="80" y="101" text-anchor="middle" fill="white" font-weight="bold" font-size="11">MARCA</text>
  <text x="40" y="120" fill="#555" font-size="10">id_marca PK</text>
  <text x="40" y="134" fill="#555" font-size="10">nome</text>
  <text x="40" y="148" fill="#555" font-size="10">paese</text>

  <!-- FORNITORE -->
  <rect x="30" y="288" width="100" height="75" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="30" y="288" width="100" height="20" rx="5" fill="#343a40"/>
  <rect x="30" y="302" width="100" height="6" fill="#343a40"/>
  <text x="80" y="301" text-anchor="middle" fill="white" font-weight="bold" font-size="11">FORNITORE</text>
  <text x="40" y="320" fill="#555" font-size="10">id_fornitore PK</text>
  <text x="40" y="334" fill="#555" font-size="10">nome</text>
  <text x="40" y="348" fill="#555" font-size="10">paese</text>

  <!-- AUTO -->
  <rect x="240" y="160" width="150" height="175" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="240" y="160" width="150" height="20" rx="5" fill="#343a40"/>
  <rect x="240" y="174" width="150" height="6" fill="#343a40"/>
  <text x="315" y="173" text-anchor="middle" fill="white" font-weight="bold" font-size="11">AUTO</text>
  <text x="250" y="192" fill="#555" font-size="10">id_auto PK</text>
  <text x="250" y="206" fill="#555" font-size="10">modello</text>
  <text x="250" y="220" fill="#555" font-size="10">prezzo</text>
  <text x="250" y="234" fill="#555" font-size="10">anno</text>
  <text x="250" y="248" fill="#555" font-size="10">stato</text>
  <line x1="246" y1="255" x2="384" y2="255" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="269" fill="#e74c3c" font-size="10">id_marca FK</text>
  <text x="250" y="283" fill="#e74c3c" font-size="10">id_fornitore FK</text>
  <text x="250" y="298" fill="#e74c3c" font-size="10">id_fornitore FK</text>

  <!-- MANUTENZIONE -->
  <rect x="232" y="475" width="155" height="100" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="232" y="475" width="155" height="20" rx="5" fill="#343a40"/>
  <rect x="232" y="489" width="155" height="6" fill="#343a40"/>
  <text x="309" y="488" text-anchor="middle" fill="white" font-weight="bold" font-size="11">MANUTENZIONE</text>
  <text x="242" y="506" fill="#555" font-size="10">id_manutenzione PK</text>
  <text x="242" y="520" fill="#555" font-size="10">data_intervento</text>
  <text x="242" y="534" fill="#555" font-size="10">descrizione, costo</text>
  <text x="242" y="548" fill="#e74c3c" font-size="10">id_auto FK</text>

  <!-- CLIENTE (entità con tutti gli attributi non ancora suddivisi) -->
  <rect x="460" y="60" width="185" height="150" rx="5" fill="#fef9e7" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="460" y="60" width="185" height="20" rx="5" fill="#c0392b"/>
  <rect x="460" y="74" width="185" height="6" fill="#c0392b"/>
  <text x="552" y="73" text-anchor="middle" fill="white" font-weight="bold" font-size="12">CLIENTE</text>
  <text x="470" y="92" fill="#c0392b" font-size="10" font-weight="bold">PK</text><text x="484" y="92" fill="#333" font-size="10">id_cliente</text>
  <text x="470" y="106" fill="#555" font-size="10">email, telefono, citta</text>
  <line x1="466" y1="113" x2="639" y2="113" stroke="#e74c3c" stroke-dasharray="4,3" stroke-width="1"/>
  <text x="470" y="127" fill="#888" font-size="10">codice_fiscale, nome</text>
  <text x="470" y="141" fill="#888" font-size="10">cognome, data_nascita</text>
  <line x1="466" y1="148" x2="639" y2="148" stroke="#e74c3c" stroke-dasharray="4,3" stroke-width="1"/>
  <text x="470" y="162" fill="#888" font-size="10">partita_iva</text>
  <text x="470" y="176" fill="#888" font-size="10">ragione_sociale, settore</text>
  <text x="470" y="196" fill="#c0392b" font-size="9" font-style="italic">? come separare questi attributi ?</text>

  <!-- Cerchio generalizzazione -->
  <circle cx="545" cy="354" r="18" fill="#fef9e7" stroke="#c0392b" stroke-width="2"/>
  <text x="545" y="358" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold">G</text>

  <!-- PRIVATO -->
  <rect x="360" y="430" width="150" height="110" rx="5" fill="#eaf4fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="360" y="430" width="150" height="20" rx="5" fill="#2980b9"/>
  <rect x="360" y="444" width="150" height="6" fill="#2980b9"/>
  <text x="435" y="443" text-anchor="middle" fill="white" font-weight="bold" font-size="11">PRIVATO</text>
  <text x="370" y="461" fill="#555" font-size="10">codice_fiscale</text>
  <text x="370" y="475" fill="#555" font-size="10">nome</text>
  <text x="370" y="489" fill="#555" font-size="10">cognome</text>
  <text x="370" y="503" fill="#555" font-size="10">data_nascita</text>
  <text x="370" y="525" fill="#2980b9" font-size="9" font-style="italic">specializzazione di CLIENTE</text>

  <!-- AZIENDA -->
  <rect x="590" y="430" width="150" height="110" rx="5" fill="#fef5ec" stroke="#e67e22" stroke-width="2"/>
  <rect x="590" y="430" width="150" height="20" rx="5" fill="#e67e22"/>
  <rect x="590" y="444" width="150" height="6" fill="#e67e22"/>
  <text x="665" y="443" text-anchor="middle" fill="white" font-weight="bold" font-size="11">AZIENDA</text>
  <text x="600" y="461" fill="#555" font-size="10">partita_iva</text>
  <text x="600" y="475" fill="#555" font-size="10">ragione_sociale</text>
  <text x="600" y="489" fill="#555" font-size="10">settore</text>
  <text x="600" y="525" fill="#e67e22" font-size="9" font-style="italic">specializzazione di CLIENTE</text>

  <!-- DIPENDENTE -->
  <rect x="880" y="68" width="150" height="117" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="880" y="68" width="150" height="20" rx="5" fill="#343a40"/>
  <rect x="880" y="82" width="150" height="6" fill="#343a40"/>
  <text x="955" y="81" text-anchor="middle" fill="white" font-weight="bold" font-size="11">DIPENDENTE</text>
  <text x="890" y="100" fill="#555" font-size="10">id_dipendente PK</text>
  <text x="890" y="114" fill="#555" font-size="10">nome</text>
  <text x="890" y="128" fill="#555" font-size="10">cognome</text>
  <text x="890" y="142" fill="#555" font-size="10">ruolo, stipendio</text>

  <!-- VENDITA -->
  <rect x="852" y="278" width="160" height="130" rx="5" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5"/>
  <rect x="852" y="278" width="160" height="20" rx="5" fill="#343a40"/>
  <rect x="852" y="292" width="160" height="6" fill="#343a40"/>
  <text x="932" y="291" text-anchor="middle" fill="white" font-weight="bold" font-size="11">VENDITA</text>
  <text x="862" y="309" fill="#555" font-size="10">id_vendita PK</text>
  <text x="862" y="323" fill="#555" font-size="10">data_vendita</text>
  <text x="862" y="337" fill="#555" font-size="10">importo_totale</text>
  <line x1="858" y1="344" x2="1006" y2="344" stroke="#ddd" stroke-width="1"/>
  <text x="862" y="358" fill="#e74c3c" font-size="10">id_cliente FK</text>
  <text x="862" y="372" fill="#e74c3c" font-size="10">id_dipendente FK</text>

  <!-- ══════════════════════════════════════════
       ROMBI RELAZIONI
       ══════════════════════════════════════════ -->

  <!-- produce -->
  <polygon points="200,174 232,188 200,202 168,188" fill="#f0f4ff" stroke="#555" stroke-width="1.5"/>
  <text x="200" y="192" text-anchor="middle" fill="#333" font-size="9" font-style="italic">produce</text>

  <!-- fornisce -->
  <polygon points="200,281 232,295 200,309 168,295" fill="#f0f4ff" stroke="#555" stroke-width="1.5"/>
  <text x="200" y="299" text-anchor="middle" fill="#333" font-size="9" font-style="italic">fornisce</text>

  <!-- richiede -->
  <polygon points="313,392 348,406 313,420 278,406" fill="#f0f4ff" stroke="#555" stroke-width="1.5"/>
  <text x="313" y="410" text-anchor="middle" fill="#333" font-size="9" font-style="italic">richiede</text>

  <!-- effettua -->
  <polygon points="752,221 784,235 752,249 720,235" fill="#f0f4ff" stroke="#555" stroke-width="1.5"/>
  <text x="752" y="239" text-anchor="middle" fill="#333" font-size="9" font-style="italic">effettua</text>

  <!-- gestisce -->
  <polygon points="958,218 990,232 958,246 926,232" fill="#f0f4ff" stroke="#555" stroke-width="1.5"/>
  <text x="958" y="236" text-anchor="middle" fill="#333" font-size="9" font-style="italic">gestisce</text>

  <!-- DETTAGLIO_VENDITA -->
  <polygon points="662,530 730,560 662,590 594,560" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <text x="662" y="564" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">DETTAGLIO_VENDITA</text>

  <!-- Nota in basso -->
  <rect x="30" y="618" width="1040" height="60" rx="5" fill="#fef9e7" stroke="#c0392b" stroke-width="1"/>
  <text x="550" y="638" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">Problema aperto: come tradurre la generalizzazione CLIENTE → PRIVATO / AZIENDA nel modello relazionale?</text>
  <text x="550" y="656" text-anchor="middle" fill="#555" font-size="11">La specializzazione è totale ed esclusiva: ogni cliente è obbligatoriamente privato oppure azienda, mai entrambi e mai nessuno dei due.</text>
  <text x="550" y="672" text-anchor="middle" fill="#555" font-size="11">Esistono tre strategie di traduzione, descritte nelle sezioni successive, ognuna con vantaggi e svantaggi diversi.</text>
</svg>
